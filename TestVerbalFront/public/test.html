<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Aplicar Test | Test Verbal</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header class="hero">
    <h1>Test de Comprensión Verbal</h1>
    <p>Lea cada enunciado y seleccione una opción.</p>
</header>

<main class="container">
    <section class="card">
        <div class="topbar">
            <h2>Preguntas</h2>
            <div>
                <span id="timer" class="badge">00:00</span>
                <span id="contador" class="badge">0/0</span>
            </div>
        </div>

        <div id="preguntas"></div>

        <button id="finalizar">Finalizar test</button>
        <p id="estado" class="estado"></p>
    </section>
</main>

<script src="js/test.js"></script>
</body>
</html>
