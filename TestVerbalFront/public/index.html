<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inicio | Test Verbal</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>

<header class="hero">
    <h1>Test de Comprensión Verbal</h1>
    <p>Seleccione un evaluado para iniciar la prueba.</p>
</header>

<main class="container">
    <section class="card">
        <h2>Iniciar evaluación</h2>

        <label for="evaluado">Evaluado</label>
        <select id="evaluado"></select>

        <label for="codigoAcceso">Código de acceso</label>
        <input id="codigoAcceso" type="password" placeholder="Ingrese su código">

        <button id="iniciar">Iniciar test</button>

        <a class="link" href="resumen.html">Ver resumen de evaluaciones</a>

        <p id="estado" class="estado"></p>
    </section>
</main>

<script src="./js/index.js"></script>
</body>
</html>
